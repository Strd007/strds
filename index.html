<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STRD - Market Dashboard</title>
    <!-- TradingView Widgets -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
            background: #0a0e1a;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f1219 0%, #080b10 100%);
            border-bottom: 1px solid #2a2f3f;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00ff88, #00a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .header .sub {
            font-size: 0.8rem;
            color: #6c757d;
            margin-left: 15px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            background: #0f1219;
            padding: 10px 20px;
            border-bottom: 1px solid #2a2f3f;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            color: #9ca3af;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: monospace;
        }

        .tab-btn:hover {
            background: #1f2937;
            color: #fff;
        }

        .tab-btn.active {
            background: #00a6ff20;
            color: #00a6ff;
            border-bottom: 2px solid #00a6ff;
        }

        /* Container principal */
        .dashboard-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 0;
            height: calc(100vh - 110px);
            overflow: hidden;
        }

        /* Sidebar esquerda - Calendário Econômico */
        .calendar-sidebar {
            background: #0c0f17;
            border-right: 1px solid #2a2f3f;
            overflow-y: auto;
            padding: 15px;
        }

        .calendar-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 3px solid #00ff88;
            padding-left: 12px;
        }

        .event-item {
            background: #11151f;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid;
            transition: transform 0.2s;
        }

        .event-item:hover {
            transform: translateX(3px);
        }

        .event-time {
            font-size: 0.7rem;
            color: #6c757d;
            font-family: monospace;
        }

        .event-name {
            font-weight: 600;
            margin: 5px 0;
            font-size: 0.85rem;
        }

        .event-impact {
            font-size: 0.7rem;
            font-weight: bold;
        }

        .impact-high { color: #ff4444; }
        .impact-medium { color: #ffaa44; }
        .impact-low { color: #44ff44; }

        /* Conteúdo principal */
        .main-content {
            overflow-y: auto;
            padding: 20px;
        }

        /* Widgets de mercado */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .market-card {
            background: #11151f;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2a2f3f;
            transition: all 0.2s;
        }

        .market-card:hover {
            border-color: #00a6ff;
            transform: translateY(-2px);
        }

        .market-symbol {
            font-size: 0.7rem;
            color: #6c757d;
            text-transform: uppercase;
        }

        .market-price {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 8px 0;
        }

        .market-change {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .positive { color: #00ff88; }
        .negative { color: #ff4444; }

        /* Seções regionais */
        .region-section {
            margin-bottom: 30px;
        }

        .region-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #2a2f3f;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .index-item {
            background: #0f1219;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* TradingView Widget */
        .tv-widget {
            margin: 25px 0;
            background: #11151f;
            border-radius: 12px;
            padding: 10px;
        }

        /* Aba IA */
        .ai-chat {
            background: #11151f;
            border-radius: 12px;
            padding: 20px;
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user-message {
            background: #00a6ff20;
            margin-left: auto;
            text-align: right;
        }

        .ai-message {
            background: #2a2f3f;
            margin-right: auto;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #0c0f17;
            border: 1px solid #2a2f3f;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: monospace;
        }

        .chat-send {
            background: #00a6ff;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        /* Aba Notícias */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: #11151f;
            border-radius: 12px;
            padding: 18px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-3px);
            background: #1a1f2c;
        }

        .news-source {
            font-size: 0.7rem;
            color: #00a6ff;
            text-transform: uppercase;
        }

        .news-title {
            font-weight: bold;
            margin: 10px 0;
            font-size: 1rem;
        }

        .news-summary {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0c0f17;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2f3f;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
            .calendar-sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡STRD <span class="sub">Market Intelligence Dashboard</span></h1>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="dashboard">📊 MARKET DASHBOARD</button>
        <button class="tab-btn" data-tab="ai">🤖 AI ASSISTANT</button>
        <button class="tab-btn" data-tab="news">📰 NEWS HUB</button>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar Calendário Econômico -->
        <div class="calendar-sidebar" id="calendarSidebar">
            <div class="calendar-header">
                <i class="fas fa-calendar-alt"></i> CALENDÁRIO ECONÔMICO
            </div>
            <div id="economicCalendar">
                <!-- Carregado via JS -->
            </div>
        </div>

        <!-- Conteúdo Principal -->
        <div class="main-content">
            <!-- Dashboard Tab -->
            <div id="dashboardTab" class="tab-content">
                <!-- Principais Ativos -->
                <div class="market-grid" id="mainAssets">
                    <!-- Preenchido via JS -->
                </div>

                <!-- Mercados por Região -->
                <div class="region-section">
                    <div class="region-title"><i class="fas fa-chart-line"></i> 🇺🇸 AMÉRICAS</div>
                    <div class="indices-grid" id="americasIndices"></div>
                </div>

                <div class="region-section">
                    <div class="region-title"><i class="fas fa-globe-asia"></i> 🌏 ÁSIA</div>
                    <div class="indices-grid" id="asiaIndices"></div>
                </div>

                <div class="region-section">
                    <div class="region-title"><i class="fas fa-globe-europe"></i> 🇪🇺 EUROPA</div>
                    <div class="indices-grid" id="europeIndices"></div>
                </div>

                <!-- Títulos Americanos -->
                <div class="region-section">
                    <div class="region-title"><i class="fas fa-chart-simple"></i> 📉 TREASURY YIELDS</div>
                    <div class="indices-grid" id="treasuryYields"></div>
                </div>

                <!-- TradingView Widget -->
                <div class="tv-widget">
                    <div class="region-title" style="margin-bottom: 10px;"><i class="fas fa-chart-line"></i> S&P 500 CHART</div>
                    <div id="tradingview-widget"></div>
                </div>
            </div>

            <!-- AI Tab -->
            <div id="aiTab" class="tab-content" style="display: none;">
                <div class="ai-chat">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai-message">
                            🤖 Olá! Sou sua IA Financeira. Pergunte sobre mercados, análises técnicas, tendências ou qualquer dúvida financeira!
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Digite sua pergunta...">
                        <button class="chat-send" id="sendBtn">Enviar</button>
                    </div>
                </div>
            </div>

            <!-- News Tab -->
            <div id="newsTab" class="tab-content" style="display: none;">
                <div class="news-grid" id="newsGrid">
                    <!-- Notícias carregadas via API -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados simulados de mercado (com mudanças em tempo real)
        let marketData = {
            // Principais
            SPX: { price: 4785.32, change: 0.85, symbol: "US500" },
            DJI: { price: 37658.21, change: 0.42, symbol: "US30" },
            IBOV: { price: 128450, change: -0.32, symbol: "IBOV" },
            VIX: { price: 13.24, change: -2.1, symbol: "VIX" },
            DXY: { price: 102.45, change: 0.15, symbol: "DXY" },
            BTC: { price: 43850, change: 1.25, symbol: "BTC" },
            GOLD: { price: 2035.60, change: 0.35, symbol: "OURO" },
            SILVER: { price: 23.85, change: -0.22, symbol: "SILVER" },
            BRENT: { price: 79.34, change: 0.95, symbol: "BRENT" },
            WTI: { price: 74.56, change: 1.12, symbol: "WTI" }
        };

        // Dados regionais
        const regionalIndices = {
            americas: [
                { name: "S&P 500", value: 4785.32, change: 0.85, symbol: "SPX" },
                { name: "NASDAQ", value: 16875.14, change: 1.12, symbol: "NDX" },
                { name: "Dow Jones", value: 37658.21, change: 0.42, symbol: "INDU" },
                { name: "Ibovespa", value: 128450, change: -0.32, symbol: "IBOV" },
                { name: "Bovespa Futuro", value: 129120, change: -0.18, symbol: "WIN" },
                { name: "Merval ARG", value: 1023450, change: 2.45, symbol: "MERV" }
            ],
            asia: [
                { name: "Nikkei 225", value: 36580.42, change: 0.95, symbol: "N225" },
                { name: "Hang Seng", value: 16425.33, change: -0.45, symbol: "HSI" },
                { name: "Shanghai Comp", value: 2986.18, change: 0.62, symbol: "SSE" },
                { name: "Shenzhen", value: 8950.45, change: 0.88, symbol: "SZSE" },
                { name: "KOSPI", value: 2540.21, change: 0.33, symbol: "KOSPI" },
                { name: "S&P/ASX 200", value: 7430.55, change: 0.28, symbol: "ASX" }
            ],
            europe: [
                { name: "Euro Stoxx 50", value: 4685.22, change: 0.55, symbol: "SX5E" },
                { name: "FTSE 100", value: 7680.34, change: 0.38, symbol: "UKX" },
                { name: "DAX", value: 16985.45, change: 0.72, symbol: "DAX" },
                { name: "CAC 40", value: 7560.12, change: 0.45, symbol: "CAC" },
                { name: "IBEX 35", value: 10045.67, change: 0.29, symbol: "IBEX" },
                { name: "FTSE MIB", value: 30450.88, change: 0.63, symbol: "MIB" }
            ]
        };

        const treasuries = [
            { name: "US 2-Year", yield: 4.32, change: 0.02 },
            { name: "US 5-Year", yield: 4.12, change: 0.01 },
            { name: "US 10-Year", yield: 4.05, change: -0.01 }
        ];

        // Calendário Econômico (eventos simulados)
        const economicEvents = [
            { time: "10:30", name: "CPI (EUA)", impact: "high", country: "EUA", prev: "3.1%", actual: "3.0%" },
            { time: "09:00", name: "Decisão Taxa BCB", impact: "high", country: "Brasil", prev: "11.75%", actual: "11.50%" },
            { time: "04:00", name: "PMI Industrial Zona do Euro", impact: "medium", country: "Euro", prev: "46.5", actual: "47.2" },
            { time: "15:30", name: "Estoques de Petróleo API", impact: "medium", country: "EUA", prev: "-2.1M", actual: "-1.2M" },
            { time: "08:30", name: "Pedidos de Desemprego", impact: "high", country: "EUA", prev: "218K", actual: "215K" },
            { time: "12:00", name: "PIB Alemão", impact: "high", country: "Alemanha", prev: "-0.1%", actual: "0.1%" }
        ];

        // Notícias
        const newsData = [
            { source: "Bloomberg", title: "Fed mantém juros e sinaliza cortes em 2024", summary: "Mercado reage com otimismo após comunicado do FOMC.", link: "#" },
            { source: "Reuters", title: "Petróleo sobe com tensões no Oriente Médio", summary: "Brent e WTI avançam mais de 1% com riscos geopolíticos.", link: "#" },
            { source: "WSJ", title: "Big Techs lideram alta em Wall Street", summary: "Nvidia e Microsoft atingem novos recordes históricos.", link: "#" },
            { source: "Financial Times", title: "BCE sinaliza flexibilização monetária", summary: "Lagarde destaca desaceleração da inflação na zona do euro.", link: "#" },
            { source: "Valor Econômico", title: "Ibovespa oscila com exterior e expectativa fiscal", summary: "Investidores aguardam definição do arcabouço fiscal.", link: "#" },
            { source: "CNBC", title: "Criptomoedas recuperam US$ 1 trilhão em valor", summary: "Bitcoin supera US$ 44k com aprovação de ETFs.", link: "#" }
        ];

        function formatChange(change) {
            const prefix = change > 0 ? '+' : '';
            return `${prefix}${change.toFixed(2)}%`;
        }

        function updateMarketDisplay() {
            // Principais ativos
            const mainAssetsDiv = document.getElementById('mainAssets');
            mainAssetsDiv.innerHTML = '';
            for (const [key, data] of Object.entries(marketData)) {
                const card = document.createElement('div');
                card.className = 'market-card';
                card.innerHTML = `
                    <div class="market-symbol">${data.symbol}</div>
                    <div class="market-price">${data.price.toLocaleString()}</div>
                    <div class="market-change ${data.change >= 0 ? 'positive' : 'negative'}">
                        ${data.change >= 0 ? '▲' : '▼'} ${formatChange(data.change)}
                    </div>
                `;
                mainAssetsDiv.appendChild(card);
            }

            // Américas
            const americasDiv = document.getElementById('americasIndices');
            americasDiv.innerHTML = regionalIndices.americas.map(idx => `
                <div class="index-item">
                    <span>${idx.name}</span>
                    <span style="font-weight: bold;">${idx.value.toLocaleString()}</span>
                    <span class="${idx.change >= 0 ? 'positive' : 'negative'}">${idx.change >= 0 ? '▲' : '▼'} ${formatChange(idx.change)}</span>
                </div>
            `).join('');

            // Ásia
            const asiaDiv = document.getElementById('asiaIndices');
            asiaDiv.innerHTML = regionalIndices.asia.map(idx => `
                <div class="index-item">
                    <span>${idx.name}</span>
                    <span style="font-weight: bold;">${idx.value.toLocaleString()}</span>
                    <span class="${idx.change >= 0 ? 'positive' : 'negative'}">${idx.change >= 0 ? '▲' : '▼'} ${formatChange(idx.change)}</span>
                </div>
            `).join('');

            // Europa
            const europeDiv = document.getElementById('europeIndices');
            europeDiv.innerHTML = regionalIndices.europe.map(idx => `
                <div class="index-item">
                    <span>${idx.name}</span>
                    <span style="font-weight: bold;">${idx.value.toLocaleString()}</span>
                    <span class="${idx.change >= 0 ? 'positive' : 'negative'}">${idx.change >= 0 ? '▲' : '▼'} ${formatChange(idx.change)}</span>
                </div>
            `).join('');

            // Títulos
            const treasuryDiv = document.getElementById('treasuryYields');
            treasuryDiv.innerHTML = treasuries.map(t => `
                <div class="index-item">
                    <span>${t.name}</span>
                    <span style="font-weight: bold;">${t.yield.toFixed(2)}%</span>
                    <span class="${t.change >= 0 ? 'positive' : 'negative'}">${t.change >= 0 ? '▲' : '▼'} ${formatChange(t.change)}</span>
                </div>
            `).join('');
        }

        function loadEconomicCalendar() {
            const calendarDiv = document.getElementById('economicCalendar');
            calendarDiv.innerHTML = economicEvents.map(event => `
                <div class="event-item" style="border-left-color: ${event.impact === 'high' ? '#ff4444' : event.impact === 'medium' ? '#ffaa44' : '#44ff44'}">
                    <div class="event-time">⏰ ${event.time} - ${event.country}</div>
                    <div class="event-name">${event.name}</div>
                    <div class="event-impact ${event.impact === 'high' ? 'impact-high' : event.impact === 'medium' ? 'impact-medium' : 'impact-low'}">
                        🔥 Impacto: ${event.impact.toUpperCase()} | Prev: ${event.prev} | Atual: ${event.actual}
                    </div>
                </div>
            `).join('');
        }

        function loadTradingViewWidget() {
            new TradingView.widget({
                "width": "100%",
                "height": 400,
                "symbol": "SPX",
                "interval": "D",
                "timezone": "America/New_York",
                "theme": "dark",
                "style": "1",
                "locale": "br",
                "toolbar_bg": "#0f1219",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview-widget"
            });
        }

        function loadNews() {
            const newsGrid = document.getElementById('newsGrid');
            newsGrid.innerHTML = newsData.map(news => `
                <div class="news-card" onclick="window.open('${news.link}', '_blank')">
                    <div class="news-source"><i class="fas fa-newspaper"></i> ${news.source}</div>
                    <div class="news-title">${news.title}</div>
                    <div class="news-summary">${news.summary}</div>
                </div>
            `).join('');
        }

        // Simular atualizações de mercado em tempo real
        function simulateMarketUpdates() {
            setInterval(() => {
                for (let key in marketData) {
                    let change = (Math.random() - 0.5) * 0.8;
                    marketData[key].change += change * 0.2;
                    marketData[key].change = Math.min(Math.max(marketData[key].change, -3), 3);
                    let priceChange = marketData[key].price * (marketData[key].change / 100);
                    marketData[key].price += priceChange * 0.1;
                }
                updateMarketDisplay();
            }, 8000);
        }

        // Função IA Simulada
        function aiResponse(question) {
            const lowerQ = question.toLowerCase();
            if (lowerQ.includes('bitcoin') || lowerQ.includes('btc')) {
                return `Bitcoin (BTC) está em ${marketData.BTC.price.toLocaleString()} USD com variação de ${formatChange(marketData.BTC.change)}. Tendência de alta no curto prazo com suporte em 42k.`;
            } else if (lowerQ.includes('sp500') || lowerQ.includes('s&p')) {
                return `S&P 500 opera em ${marketData.SPX.price} pontos, ${formatChange(marketData.SPX.change)}. Setor de tecnologia lidera altas.`;
            } else if (lowerQ.includes('ouro') || lowerQ.includes('gold')) {
                return `Ouro (XAUUSD) em ${marketData.GOLD.price} USD/oz, variação ${formatChange(marketData.GOLD.change)}. Perspectiva de hedge contra inflação.`;
            } else if (lowerQ.includes('petróleo')) {
                return `Brent: ${marketData.BRENT.price} USD | WTI: ${marketData.WTI.price} USD. Tensões no Oriente Médio elevam preços.`;
            } else {
                return `Análise: Mercados globais mistos. S&P 500 ${formatChange(marketData.SPX.change)} | Dólar Index ${marketData.DXY.price}. Acompanhe indicadores econômicos para decisões. Lembre-se: diversificação é essencial!`;
            }
        }

        // Chat IA
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            msgDiv.innerHTML = isUser ? `👤 ${text}` : `🤖 ${text}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const question = chatInput.value.trim();
            if (!question) return;
            addMessage(question, true);
            const response = aiResponse(question);
            setTimeout(() => addMessage(response, false), 500);
            chatInput.value = '';
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Navegação de Tabs
        const tabs = document.querySelectorAll('.tab-btn');
        const dashboardTab = document.getElementById('dashboardTab');
        const aiTab = document.getElementById('aiTab');
        const newsTab = document.getElementById('newsTab');
        const calendarSidebar = document.getElementById('calendarSidebar');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.getAttribute('data-tab');
                
                dashboardTab.style.display = 'none';
                aiTab.style.display = 'none';
                newsTab.style.display = 'none';
                calendarSidebar.style.display = 'block';
                
                if (tabId === 'dashboard') {
                    dashboardTab.style.display = 'block';
                    calendarSidebar.style.display = 'block';
                } else if (tabId === 'ai') {
                    aiTab.style.display = 'block';
                    calendarSidebar.style.display = 'none';
                } else if (tabId === 'news') {
                    newsTab.style.display = 'block';
                    calendarSidebar.style.display = 'none';
                    loadNews();
                }
            });
        });

        // Inicialização
        updateMarketDisplay();
        loadEconomicCalendar();
        loadTradingViewWidget();
        loadNews();
        simulateMarketUpdates();

        // Atualizar preços a cada 10s
        setInterval(() => {
            updateMarketDisplay();
        }, 10000);
    </script>
</body>
</html>
