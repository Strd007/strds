<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>STRD Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0f14;
      color: #fff;
    }

    .header {
      background: #11161c;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #222;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #00ffcc;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr 350px;
      height: calc(100vh - 50px);
      gap: 5px;
      padding: 5px;
    }

    .box {
      background: #11161c;
      border: 1px solid #1c2228;
      padding: 5px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 1000px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: 300px 400px 400px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">STRD</div>
  </div>

  <div class="container">

    <div class="box">
      <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_event,exc_actual,exc_forecast,exc_previous&features=datepicker,timezone&countries=5,32,6,72,17,37,110,43,36&calType=day&timeZone=12&lang=12"></iframe>
    </div>

    <div class="box">
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=5&theme=dark"></iframe>
    </div>

    <div class="box">
      <iframe src="https://s.tradingview.com/embed-widget/market-overview/?locale=br#%7B%22colorTheme%22%3A%22dark%22%2C%22tabs%22%3A%5B%7B%22title%22%3A%22Mercados%22%2C%22symbols%22%3A%5B%7B%22s%22%3A%22FOREXCOM%3ASPXUSD%22%7D%2C%7B%22s%22%3A%22FOREXCOM%3ANSXUSD%22%7D%2C%7B%22s%22%3A%22BITSTAMP%3ABTCUSD%22%7D%2C%7B%22s%22%3A%22FX_IDC%3AUSDBRL%22%7D%5D%7D%5D%7D"></iframe>
    </div>

  </div>

</body>
</html>
